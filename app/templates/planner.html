{% extends "base.html" %}
{% block title %}スタンプ企画（AIプランナー）{% endblock %}
{% block content %}

<div class="mb-4">
  <a href="{{ url_for('stamps.index') }}" class="text-muted text-decoration-none">
    <i class="bi bi-arrow-left me-1"></i>一覧に戻る
  </a>
  <h2 class="fw-bold mt-1"><i class="bi bi-magic text-success me-2"></i>スタンプ企画プランナー</h2>
  <p class="text-muted">利用シーンを選ぶだけで、セット名・セリフ・写真・デザインまで自動で企画します。</p>
</div>

<form method="post" action="{{ url_for('stamps.planner_generate') }}">

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title mb-3"><i class="bi bi-chat-heart me-2"></i>利用シーン</h5>
      <div class="row row-cols-2 row-cols-md-4 g-2">
        {% for key, label in SCENES.items() %}
        <div class="col">
          <input type="radio" class="btn-check" name="scene" id="scene-{{ key }}"
                 value="{{ key }}" {% if loop.first %}checked{% endif %}>
          <label class="btn btn-outline-success w-100" for="scene-{{ key }}">{{ label }}</label>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <h6 class="fw-bold mb-2">対象ユーザー</h6>
          <select class="form-select" name="target">
            {% for key, label in TARGETS.items() %}
            <option value="{{ key }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <h6 class="fw-bold mb-2">雰囲気</h6>
          <div class="d-flex flex-wrap gap-1">
            {% for key, label in MOODS.items() %}
            <input type="radio" class="btn-check" name="mood" id="mood-{{ key }}"
                   value="{{ key }}" {% if loop.first %}checked{% endif %}>
            <label class="btn btn-sm btn-outline-secondary" for="mood-{{ key }}">{{ label }}</label>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <h6 class="fw-bold mb-2">スタンプ数</h6>
          <select class="form-select" name="count">
            {% for c in ALLOWED_COUNTS %}
            <option value="{{ c }}">{{ c }}個</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>
  </div>

  <button type="submit" class="btn btn-success btn-lg px-4">
    <i class="bi bi-stars me-1"></i>セット案を生成する
  </button>
</form>

{% endblock %}
