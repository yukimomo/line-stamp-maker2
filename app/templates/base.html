<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LINE スタンプ作成{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f4f6f8; }
    .navbar-brand { font-weight: 700; letter-spacing: .02em; }
    .stamp-thumb {
      width: 100%; height: 120px;
      object-fit: contain; background: #fff;
      border-radius: 6px;
    }
    .slot-pick-area {
      height: 120px; display: flex; align-items: center; justify-content: center;
      background: #f8f9fa; border: 2px dashed #ced4da; border-radius: 6px;
      cursor: pointer; transition: border-color .15s;
    }
    .slot-pick-area:hover { border-color: #0d6efd; }
    .slot-pick-area.has-photo { border-style: solid; border-color: #0d6efd; }
    .photo-grid-item {
      width: 90px; height: 90px; object-fit: cover;
      border-radius: 6px; cursor: pointer; border: 2px solid transparent;
      transition: border-color .15s, transform .1s;
    }
    .photo-grid-item:hover { border-color: #0d6efd; transform: scale(1.05); }
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 9999; display: none;
      align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success mb-4 shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('stamps.index') }}">
      <i class="bi bi-emoji-smile-fill"></i> LINE スタンプ作成
    </a>
  </div>
</nav>

<div id="loading-overlay">
  <div class="text-center text-white">
    <div class="spinner-border mb-3" style="width:3rem;height:3rem;" role="status"></div>
    <div class="fs-5">スタンプを生成しています…<br><small class="text-white-50">しばらくお待ちください</small></div>
  </div>
</div>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
